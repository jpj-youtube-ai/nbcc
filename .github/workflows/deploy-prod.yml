name: Deploy production
# Triggered when "Deploy staging" finishes successfully. We use workflow_run
# (not the tag push) because a tag pushed with the default GITHUB_TOKEN does not
# trigger other workflows. The production GitHub Environment provides the
# manual approval gate. Prefer tag-triggering? Push the tag with a PAT instead.
on:
  workflow_run:
    workflows: ["Deploy staging"]
    types: [completed]
  # On-demand promotion of an already-staging-validated image (by commit SHA),
  # e.g. when the staging run that validated it predates this workflow being
  # enabled. The production Environment's required-reviewer gate still applies.
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Staging-validated commit SHA to promote to production"
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  PROJECT: charity-site
  ENVIRONMENT: production

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production   # set required reviewers on this environment
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Resolve image (same artifact staging built)
        run: |
          SHA="${{ github.event.workflow_run.head_sha || inputs.image_sha }}"
          echo "IMAGE=${{ steps.ecr.outputs.registry }}/${PROJECT}:${SHA}" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3

      - name: Read infra wiring from state
        working-directory: infra/envs/production
        run: |
          terraform init -input=false
          {
            echo "CLUSTER=$(terraform output -raw ecs_cluster)"
            echo "SERVICE=$(terraform output -raw ecs_service)"
            echo "FAMILY=$(terraform output -raw task_family)"
            echo "SUBNETS=$(terraform output -raw task_subnet_ids_csv)"
            echo "SG=$(terraform output -raw task_security_group_id)"
            echo "ALB_URL=http://$(terraform output -raw alb_dns_name)"
          } >> "$GITHUB_ENV"

      - name: Register new task definition (swap image only)
        run: |
          CURRENT=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query 'taskDefinition')
          NEW=$(echo "$CURRENT" | jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | {family, networkMode, requiresCompatibilities, cpu, memory,
               executionRoleArn, taskRoleArn, containerDefinitions}')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" \
                  --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TASK_ARN=$ARN" >> "$GITHUB_ENV"

      - name: Run DB migrations (expand phase)
        run: |
          TASK=$(aws ecs run-task --cluster "$CLUSTER" --launch-type FARGATE \
            --task-definition "$TASK_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["npm","run","migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK"
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
                   --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migration exit code: $CODE"
          [ "$CODE" = "0" ]

      - name: Deploy service
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$TASK_ARN" >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --service "$SERVICE"

      - name: Smoke test production
        run: bash scripts/smoke.sh "$ALB_URL"
