<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO -->
    <title>Contact — Charity Site</title>
    <meta
      name="description"
      content="Get in touch with Charity Site. Find our contact details or send us a message — we'd love to hear from you."
    />
    <!-- Canonical/og:url use a PLACEHOLDER domain (https://www.example.org);
         replace at REQ-033 when the real host/domain is chosen. -->
    <link rel="canonical" href="https://www.example.org/contact" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Charity Site" />
    <meta property="og:title" content="Contact — Charity Site" />
    <meta
      property="og:description"
      content="Get in touch with Charity Site. Find our contact details or send us a message — we'd love to hear from you."
    />
    <meta property="og:url" content="https://www.example.org/contact" />
    <!-- Share image asset is REQ-034; the path is referenced only. -->
    <meta property="og:image" content="https://www.example.org/assets/img/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contact — Charity Site" />
    <meta
      name="twitter:description"
      content="Get in touch with Charity Site. Find our contact details or send us a message — we'd love to hear from you."
    />
    <meta name="twitter:image" content="https://www.example.org/assets/img/og-image.png" />

    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <!-- Primary navigation (REQ-002). Footer slot below is REQ-003. -->
    <header class="nav" id="nav" data-region="nav">
      <div class="wrap">
        <a class="brand" href="/">NBCC</a>
        <nav aria-label="Primary">
          <ul class="nav-links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/about-us">About</a></li>
            <li><a href="/donate">Donate</a></li>
            <li><a href="/contact" class="active" aria-current="page">Contact</a></li>
          </ul>
        </nav>
        <a class="nav-cta" href="/donate">Donate</a>
        <button class="burger" id="burger" aria-label="Open menu" aria-expanded="false" aria-controls="navLinks">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <main class="site-main" id="main">
      <h1>Contact</h1>
      <p>
        This is the placeholder Contact page. The contact details and form,
        along with the shared navigation and footer, are delivered by later
        requirements.
      </p>
      <!-- Contact page sections: REQ-010+. Empty placeholder for now. -->
      <section class="page-sections" data-region="sections"></section>
    </main>

    <!-- Site footer: REQ-010+. Empty placeholder for now. -->
    <footer class="site-footer" data-region="footer"></footer>
  </body>
</html>
