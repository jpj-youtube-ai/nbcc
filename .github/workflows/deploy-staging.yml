name: Deploy staging
on:
  push:
    branches: [main]
    # Docs-only changes shouldn't rebuild/redeploy the service.
    paths-ignore:
      - "**/*.md"

permissions:
  id-token: write   # OIDC into AWS
  contents: write   # push the release tag

concurrency: deploy-staging

env:
  AWS_REGION: eu-west-2
  PROJECT: charity-site
  ENVIRONMENT: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build & push image (shared repo, tagged by SHA = build once)
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${PROJECT}:${GITHUB_SHA}"
          # Idempotent by design: the SHA tag is immutable, so if this commit's image is
          # already in ECR (e.g. a re-run after a *later* step failed — a raced infra apply,
          # a flaky migration), reuse it instead of failing on "tag already exists". A fresh
          # SHA still builds normally; only an existing tag short-circuits.
          if aws ecr describe-images --repository-name "${PROJECT}" --image-ids imageTag="${GITHUB_SHA}" >/dev/null 2>&1; then
            echo "Image ${GITHUB_SHA} already present in ECR — reusing (build once by SHA)."
          else
            docker build -t "$IMAGE" .
            docker push "$IMAGE"
          fi
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3

      - name: Read infra wiring from state
        working-directory: infra/envs/staging
        run: |
          terraform init -input=false
          {
            echo "CLUSTER=$(terraform output -raw ecs_cluster)"
            echo "SERVICE=$(terraform output -raw ecs_service)"
            echo "FAMILY=$(terraform output -raw task_family)"
            echo "SUBNETS=$(terraform output -raw task_subnet_ids_csv)"
            echo "SG=$(terraform output -raw task_security_group_id)"
            echo "ALB_URL=$(terraform output -raw public_url)"
          } >> "$GITHUB_ENV"

      - name: Register new task definition (swap image only)
        run: |
          CURRENT=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query 'taskDefinition')
          NEW=$(echo "$CURRENT" | jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | {family, networkMode, requiresCompatibilities, cpu, memory,
               executionRoleArn, taskRoleArn, containerDefinitions}')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" \
                  --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TASK_ARN=$ARN" >> "$GITHUB_ENV"

      - name: Run all DB migrations (expand phase, before deploy)
        # One Fargate task runs every DB's provisioning + migration in order, instead
        # of five separate `ecs run-task` calls. Each run-task pays ~50s of Fargate
        # cold-start regardless of how little SQL it does, so folding the five into a
        # single container command (chained with && to preserve order and fail fast)
        # cuts ~4x that startup overhead off the deploy. Order matters: each `bootstrap:*`
        # provisions its separate database + role and MUST precede that DB's `migrate:*`.
        run: |
          TASK=$(aws ecs run-task --cluster "$CLUSTER" --launch-type FARGATE \
            --task-definition "$TASK_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["sh","-c","npm run migrate && npm run bootstrap:stories && npm run migrate:stories && npm run bootstrap:contact && npm run migrate:contact"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK"
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
                   --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migration exit code: $CODE"
          [ "$CODE" = "0" ]

      - name: Deploy service
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$TASK_ARN" >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --service "$SERVICE"

      - name: Smoke test staging
        run: bash scripts/smoke.sh "$ALB_URL"

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: BDD against staging (end-to-end, public HTTP behaviour)
        env:
          BASE_URL: ${{ env.ALB_URL }}
        # Exclude every @db scenario: these are DB-level integration tests whose step hooks
        # connect DIRECTLY to Postgres (DATABASE_URL) — and the @stripe-webhook ones also sign
        # events with the shared STRIPE_WEBHOOK_SECRET — so they cannot run against a live
        # deployment: staging's RDS is in a private subnet unreachable from the runner (they
        # fail with ECONNREFUSED). Every DB-touching feature (@stripe-webhook, @gift-aid,
        # @supporters, …) carries the @db tag, so `not @db` excludes them all and cannot drift
        # as new ones are added.
        #
        # Also exclude @stub-only: happy-path Stripe scenarios that only pass against the
        # offline stub in src/clients/stripe — they use fixture data (a preset plan's
        # STRIPE_PRICE_* placeholder, or the fake subscription sub_demo_123) that a live
        # Stripe test account has no real counterpart for, so the real SDK 502s. Their
        # validation (400) siblings reach no Stripe call and stay as live smoke coverage.
        #
        # Both sets are already covered by the full BDD in pr.yml (local app + DB + secret +
        # stub). Here we only smoke the live public HTTP behaviour against the ALB.
        run: npm run test:bdd -- --tags "not @db and not @stub-only"

      - name: Tag release (known-good staging build)
        run: |
          TAG="release-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      # Surface the validated image SHA + the exact prod-promote command in the run's
      # job summary (rendered markdown, easy to copy). Runs last, so a SHA only appears
      # once build + migrate + deploy + smoke + unit + BDD have all passed — i.e. the SHA
      # shown is always safe to promote.
      - name: Promotion hint — validated SHA for production
        if: success()
        run: |
          {
            echo "## ✅ Staging validated — promote to production"
            echo ""
            echo "Copy this to deploy the same image to prod:"
            echo ""
            echo '```'
            echo "gh workflow run deploy-prod.yml -f image_sha=${GITHUB_SHA}"
            echo '```'
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image SHA | \`${GITHUB_SHA}\` |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "PROMOTE → gh workflow run deploy-prod.yml -f image_sha=${GITHUB_SHA}"
