name: PR checks
on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: charity
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d charity"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/charity
      EXTERNAL_API_ONE_BASE_URL: https://sandbox.api-one.example
      EXTERNAL_API_ONE_KEY: ci-dummy
      EXTERNAL_API_TWO_KEY: ci-dummy
      # Stripe checkout config (REQ-028/REQ-029) is required by the schema, so the
      # app needs it to boot for the BDD step. Dummy values that satisfy the
      # schema (non-empty secret, valid URLs, non-empty price IDs); no real
      # checkout runs in CI. Real values come from SSM in staging/prod.
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_SUCCESS_URL: http://localhost:3000/donate/thank-you
      STRIPE_CANCEL_URL: http://localhost:3000/donate
      STRIPE_PRICE_BRONZE: price_ci_bronze
      STRIPE_PRICE_SILVER: price_ci_silver
      STRIPE_PRICE_GOLD: price_ci_gold
      STRIPE_PRICE_PLATINUM: price_ci_platinum
      # Stripe webhook signing secret (REQ-036/TASK-046). Required by the schema so
      # the app boots; the stripe-webhook BDD signs its events with THIS same value
      # (via generateTestHeaderString) so signature verification passes offline.
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_secret
      # Contact forwarding (REQ-030). A `.example` placeholder so the app boots and
      # the forward is stubbed (no live form service) for the BDD step.
      CONTACT_FORWARD_URL: https://forward.example/contact
      # Transactional email (TASK-070). A `.example` placeholder so the app boots and
      # the confirmation-email send is stubbed (no live provider) for the BDD step.
      EMAIL_SEND_URL: https://email.example/send
      # Declaration form base URL (TASK-075) for the in-person confirmation link/QR.
      DECLARATION_FORM_BASE_URL: http://localhost:3000
      # Admin notification recipient (TASK-092): required by the schema so the app boots.
      ADMIN_NOTIFICATION_EMAIL: admin@example.org
      # Donor portal base URL (TASK-100): required by the schema so the app boots.
      PORTAL_BASE_URL: http://localhost:3000
      # Admin session signing key (TASK-105): required by the schema so the app boots; a
      # placeholder is fine for CI (the admin-auth unit test signs/verifies with its own key).
      ADMIN_SESSION_SECRET: ci-admin-session-secret
      # Newsletter From/Reply-To address (TASK-161): required by the schema so the app boots.
      NEWSLETTER_FROM_EMAIL: newsletter@nbcc.scot
      # Thank-you From/Reply-To address (TASK-165): defaulted in the schema, set here for parity.
      GIVING_FROM_EMAIL: giving@nbcc.scot
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run migrate
      - run: npm run test:unit
      - name: Start app + BDD against it
        run: |
          node dist/index.js & APP_PID=$!
          bash scripts/smoke.sh http://localhost:3000
          npm run test:bdd
          kill $APP_PID
