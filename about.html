<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO -->
    <title>About — Charity Site</title>
    <meta
      name="description"
      content="Learn about Charity Site — our mission, our story, and the people working to support our community."
    />
    <!-- Canonical/og:url use a PLACEHOLDER domain (https://www.example.org);
         replace at REQ-033 when the real host/domain is chosen. -->
    <link rel="canonical" href="https://www.example.org/about-us" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Charity Site" />
    <meta property="og:title" content="About — Charity Site" />
    <meta
      property="og:description"
      content="Learn about Charity Site — our mission, our story, and the people working to support our community."
    />
    <meta property="og:url" content="https://www.example.org/about-us" />
    <!-- Share image asset is REQ-034; the path is referenced only. -->
    <meta property="og:image" content="https://www.example.org/assets/img/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="About — Charity Site" />
    <meta
      name="twitter:description"
      content="Learn about Charity Site — our mission, our story, and the people working to support our community."
    />
    <meta name="twitter:image" content="https://www.example.org/assets/img/og-image.png" />

    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <!-- Primary navigation: REQ-002 / REQ-003. Empty placeholder for now. -->
    <header class="site-header" data-region="nav"></header>

    <main class="site-main" id="main">
      <h1>About</h1>
      <p>
        This is the placeholder About page. Its content sections, along with the
        shared navigation and footer, are delivered by later requirements.
      </p>
      <!-- About page sections: REQ-010+. Empty placeholder for now. -->
      <section class="page-sections" data-region="sections"></section>
    </main>

    <!-- Site footer: REQ-010+. Empty placeholder for now. -->
    <footer class="site-footer" data-region="footer"></footer>
  </body>
</html>
