<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- A private, token gated page reached only via an admin invite or reset email link.
         Both /invite and /reset (see _redirects) rewrite to this one file: the token's
         purpose differs, the accept flow (set a password) is identical. Keep it out of
         search entirely, like admin.html and portal.html. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Set your password | Night Before Christmas Campaign</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/admin.css" />
  </head>
  <body class="admin-body">
    <a class="skip-link" href="#main">Skip to content</a>
    <main class="admin-main" id="main" tabindex="-1">
      <section class="admin-login" aria-labelledby="setpw-heading">
        <div class="admin-login-card card card-lg">
          <img class="admin-login-logo" src="/assets/img/nbcc-elf.png" alt="" width="72" height="72" />
          <h1 id="setpw-heading">Set your password</h1>
          <p class="admin-login-sub" id="setpwIntro">Choose a password to finish setting up your account.</p>

          <!-- Shown when the URL has no token at all: no point rendering the form. -->
          <p class="admin-login-error" id="setpwNoToken" role="alert" aria-live="polite" hidden>
            This link is missing its token. Ask an admin to send you a new one.
          </p>

          <form id="setpwForm" novalidate>
            <div class="admin-field">
              <label for="setpwPassword">New password</label>
              <input id="setpwPassword" name="password" type="password" autocomplete="new-password" minlength="10" required aria-required="true" />
            </div>
            <div class="admin-field">
              <label for="setpwConfirm">Confirm password</label>
              <input id="setpwConfirm" name="confirm" type="password" autocomplete="new-password" minlength="10" required aria-required="true" />
            </div>
            <p class="admin-login-error" id="setpwError" role="alert" aria-live="polite" hidden></p>
            <button class="btn btn-primary admin-login-submit" type="submit" id="setpwSubmit">Set password</button>
          </form>

          <!-- Honest save: only ever shown after a real 200 from the API. -->
          <div id="setpwSuccess" role="status" aria-live="polite" hidden>
            <p class="admin-login-sub">Your password has been set.</p>
            <a class="btn btn-primary admin-login-submit" href="/admin">Sign in</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        "use strict";

        var form = document.getElementById("setpwForm");
        var passwordInput = document.getElementById("setpwPassword");
        var confirmInput = document.getElementById("setpwConfirm");
        var errorEl = document.getElementById("setpwError");
        var noTokenEl = document.getElementById("setpwNoToken");
        var successEl = document.getElementById("setpwSuccess");
        var submitBtn = document.getElementById("setpwSubmit");

        function showError(message) {
          errorEl.textContent = message;
          errorEl.hidden = false;
        }

        function clearError() {
          errorEl.hidden = true;
          errorEl.textContent = "";
        }

        var params = new URLSearchParams(window.location.search);
        var token = params.get("token") || "";

        if (!token) {
          form.hidden = true;
          noTokenEl.hidden = false;
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          clearError();

          var password = passwordInput.value;
          var confirm = confirmInput.value;

          if (password.length < 10) {
            showError("Your password must be at least 10 characters.");
            return;
          }
          if (password !== confirm) {
            showError("Those passwords do not match. Please try again.");
            return;
          }

          submitBtn.disabled = true;

          fetch("/api/admin/set-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, password: password }),
          })
            .then(function (res) {
              // Honest save: success is shown only when the server actually returned 200.
              if (res.ok) {
                form.hidden = true;
                successEl.hidden = false;
                return;
              }
              submitBtn.disabled = false;
              showError(
                "This link has expired or has already been used. Ask an admin to send you a new one.",
              );
            })
            .catch(function () {
              submitBtn.disabled = false;
              showError("We could not reach the server. Please check your connection and try again.");
            });
        });
      })();
    </script>
  </body>
</html>
