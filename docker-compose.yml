services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://app:app@db:5432/charity
      # My Story (TASK-B2): .env's STORIES_DATABASE_URL points at localhost (for running
      # the app directly on the host); inside the compose network the DB is reachable as
      # `db`, so override it here the same way DATABASE_URL is overridden above.
      STORIES_DATABASE_URL: postgres://stories_app:stories@db:5432/stories
      # Contact inbox (2026-07-10 spec): same override pattern as STORIES_DATABASE_URL above —
      # .env's CONTACT_DATABASE_URL points at localhost; inside the compose network the DB is
      # reachable as `db`.
      CONTACT_DATABASE_URL: postgres://contact_app:contact@db:5432/contact
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine   # match the MAJOR version of your RDS engine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: charity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # My Story (TASK-B2): creates the SEPARATE `stories` database + `stories_app` role
      # on first init, mirroring scripts/bootstrap-stories-db.mjs in staging/production.
      # Contact inbox (2026-07-10 spec): same mechanism creates the SEPARATE `contact`
      # database + `contact_app` role, mirroring scripts/bootstrap-contact-db.mjs.
      # Postgres only runs docker-entrypoint-initdb.d on a FRESH data volume — see the
      # SQL file's header if you already have an existing local pgdata volume.
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d charity"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot migration runner - SAME image as the app.
  # Run explicitly:  docker compose run --rm migrate
  # Mirrors the `ecs run-task` migration step in the pipeline.
  migrate:
    build: .
    profiles: ["tools"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://app:app@db:5432/charity
    depends_on:
      db:
        condition: service_healthy
    command: npm run migrate

  # My Story (TASK-B2): the stories-DB counterpart of `migrate`, same pattern.
  # Run explicitly:  docker compose run --rm migrate-stories
  migrate-stories:
    build: .
    profiles: ["tools"]
    env_file: .env
    environment:
      STORIES_DATABASE_URL: postgres://stories_app:stories@db:5432/stories
    depends_on:
      db:
        condition: service_healthy
    command: npm run migrate:stories

  # Contact inbox (2026-07-10 spec): the contact-DB counterpart of `migrate`, same pattern.
  # Run explicitly:  docker compose run --rm migrate-contact
  migrate-contact:
    build: .
    profiles: ["tools"]
    env_file: .env
    environment:
      CONTACT_DATABASE_URL: postgres://contact_app:contact@db:5432/contact
    depends_on:
      db:
        condition: service_healthy
    command: npm run migrate:contact

volumes:
  pgdata:
